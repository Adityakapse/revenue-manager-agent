<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grand Harbour Hotel — Revenue Manager</title>
<link rel="icon" href="data:,">
<style>
 :root{--bg:#f4f6f8;--card:#fff;--ink:#1c2733;--muted:#64748b;--accent:#15616d;--accent2:#0d3b43;
       --line:#e3e9ef;--user:#15616d;--gold:#b8893a;--activity:#eef3f6}
 @media (prefers-color-scheme:dark){
   :root{--bg:#0f171e;--card:#182430;--ink:#e7edf3;--muted:#8ea0b3;--accent:#2f95a6;--accent2:#123138;
         --line:#26333f;--user:#2f95a6;--gold:#d1a256;--activity:#1b2731}
 }
 *{box-sizing:border-box}
 body{margin:0;font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);color:var(--ink)}
 ::-webkit-scrollbar{width:9px;height:9px}
 ::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
 header{background:linear-gradient(135deg,#0d3b43,#15616d);color:#fff;padding:14px 22px;
        position:sticky;top:0;z-index:5;box-shadow:0 2px 10px rgba(0,0,0,.12)}
 .brand{display:flex;align-items:center;gap:12px;max-width:880px;margin:0 auto}
 .mark{width:36px;height:36px;flex:none;border-radius:10px;background:rgba(255,255,255,.14);
       border:1px solid rgba(255,255,255,.28);display:flex;align-items:center;justify-content:center;
       font-weight:800;font-size:12.5px;letter-spacing:.4px}
 .titles{line-height:1.3}
 .h{font-size:17px;font-weight:700;letter-spacing:.2px}
 .s{font-size:12.5px;opacity:.82}
 #log{max-width:880px;margin:0 auto;padding:24px 16px 132px;min-height:calc(100vh - 64px)}

 .welcome{max-width:600px;margin:9vh auto 0;text-align:center;padding:0 16px;animation:fadein .35s ease}
 .wmark{width:54px;height:54px;margin:0 auto 18px;border-radius:16px;
       background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;
       display:flex;align-items:center;justify-content:center;font-weight:800;font-size:19px;
       box-shadow:0 8px 20px rgba(21,97,109,.28)}
 .welcome h1{margin:0 0 8px;font-size:21px;color:var(--ink)}
 .welcome p{margin:0 0 22px;color:var(--muted);font-size:14px}
 .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
 .chip{border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;
      padding:9px 15px;border-radius:999px;font-size:13.5px;transition:border-color .15s,color .15s,transform .1s}
 .chip:hover{border-color:var(--accent);color:var(--accent)}
 .chip:active{transform:scale(.97)}

 .row{display:flex;margin:16px 0;animation:fadein .25s ease}
 .bubble{padding:12px 16px;border-radius:16px;max-width:82%;box-shadow:0 1px 2px rgba(20,40,60,.06);
         white-space:normal;word-wrap:break-word}
 .user{margin-left:auto;background:var(--user);color:#fff;border-bottom-right-radius:5px}
 .bot{background:var(--card);border:1px solid var(--line);border-bottom-left-radius:5px}
 .turn{margin:16px 0;animation:fadein .25s ease}
 .activity{max-width:82%;margin-bottom:8px;background:var(--activity);border:1px solid var(--line);
           border-radius:12px;padding:6px 12px;font-size:12.5px;color:var(--muted)}
 .activity summary{cursor:pointer;font-weight:600;color:var(--accent);list-style:none;user-select:none}
 .activity summary::-webkit-details-marker{display:none}
 .activity summary:before{content:"\25B8 ";color:var(--muted)}
 .activity[open] summary:before{content:"\25BE "}
 .step{padding:3px 2px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}

 .spinner{display:inline-flex;gap:4px;align-items:center;padding:2px 0}
 .spinner i{width:6px;height:6px;border-radius:50%;background:var(--muted);
           animation:bounce 1.1s infinite ease-in-out both}
 .spinner i:nth-child(2){animation-delay:.15s}
 .spinner i:nth-child(3){animation-delay:.3s}
 @keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
 @keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

 form{position:fixed;bottom:0;left:0;right:0;background:rgba(244,246,248,.9);
      border-top:1px solid var(--line);backdrop-filter:blur(10px)}
 @media (prefers-color-scheme:dark){form{background:rgba(15,23,30,.88)}}
 .bar{max-width:880px;margin:auto;display:flex;gap:10px;padding:12px 16px}
 input{flex:1;padding:12px 15px;border:1px solid var(--line);border-radius:12px;background:var(--card);
        color:var(--ink);font-size:15px;outline:none;transition:box-shadow .15s,border-color .15s}
 input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(21,97,109,.15)}
 button{padding:12px 20px;border:0;border-radius:12px;background:var(--accent);color:#fff;
         font-weight:600;cursor:pointer;transition:background .15s,transform .1s}
 button:hover{background:var(--accent2)}
 button:active{transform:scale(.97)}
 .approve{margin-top:10px;background:var(--gold)}
 .approve:hover{filter:brightness(.92)}
</style></head><body>
<header>
  <div class="brand">
    <div class="mark">GH</div>
    <div class="titles">
      <div class="h">Grand Harbour Hotel</div>
      <div class="s">Revenue Manager</div>
    </div>
  </div>
</header>
<div id="log">
  <div id="welcome" class="welcome">
    <div class="wmark">GH</div>
    <h1>How can I help with revenue today?</h1>
    <p>Ask about pickup, pacing, segment mix, or channel dependency — I'll pull the numbers and explain what's behind them.</p>
    <div class="chips">
      <button type="button" class="chip">What's driving September 2026?</button>
      <button type="button" class="chip">Are we too dependent on OTA?</button>
      <button type="button" class="chip">Summarize this week's pickup</button>
      <button type="button" class="chip">Which segment underperformed last month?</button>
    </div>
  </div>
</div>
<form id="f"><div class="bar">
  <input id="q" autocomplete="off" autofocus
   placeholder="e.g. What's driving September 2026?  ·  Are we too dependent on OTA?">
  <button>Ask</button>
</div></form>
<script>
const log=document.getElementById('log'),f=document.getElementById('f'),q=document.getElementById('q');
let welcome=document.getElementById('welcome');
const tid='web-'+Math.random().toString(36).slice(2);
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function md(t){return esc(t).replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>').replace(/\n/g,'<br>');}
function scroll(){window.scrollTo(0,document.body.scrollHeight);}
function bubble(cls,html){const d=document.createElement('div');d.className='bubble '+cls;d.innerHTML=html;return d;}
function userRow(m){
  if(welcome){welcome.remove();welcome=null;}
  const r=document.createElement('div');r.className='row';r.appendChild(bubble('user',esc(m)));log.appendChild(r);
}

function newTurn(){
  const turn=document.createElement('div');turn.className='turn';
  const act=document.createElement('details');act.className='activity';act.open=true;
  act.innerHTML='<summary>Agent activity</summary>';
  const ans=bubble('bot','<span class="spinner"><i></i><i></i><i></i></span>');
  turn.appendChild(act);turn.appendChild(ans);log.appendChild(turn);
  return {act,ans,count:0};
}
function step(t,html){t.count++;const d=document.createElement('div');d.className='step';d.innerHTML=html;t.act.appendChild(d);scroll();}

async function send(url,message,turn){
  const t=turn||newTurn();
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},
                          body:JSON.stringify({message,thread_id:tid})});
  const reader=r.body.getReader();const dec=new TextDecoder();let buf='';
  while(true){const {value,done}=await reader.read();if(done)break;buf+=dec.decode(value,{stream:true});
    let i;while((i=buf.indexOf('\n\n'))>=0){const line=buf.slice(0,i).replace(/^data: /,'');buf=buf.slice(i+2);
      if(!line)continue;let e;try{e=JSON.parse(line);}catch(_){continue;}
      if(e.type==='tool'){
        if(e.name==='task'){step(t,'🤝 delegating to sub-agent: '+esc((e.args&&e.args.subagent_type)||'segment-analyst'));}
        else{const a=Object.entries(e.args||{}).map(function(kv){return kv[0]+'='+kv[1];}).join(', ');
             step(t,'🔧 '+esc(e.name)+(a?' ('+esc(a)+')':''));}
      }
      else if(e.type==='skill'){step(t,'📖 skill: '+esc(e.path.split('/').slice(-2)[0]));}
      else if(e.type==='answer'){t.ans.innerHTML=md(e.text);scroll();}
      else if(e.type==='approval'){
        t.ans.innerHTML='⏸ <b>Approval needed</b> to run '+esc(e.tool)+'. '+esc(e.note||'');
        const b=document.createElement('button');b.className='approve';b.textContent='Approve & run';
        b.onclick=function(){b.remove();t.ans.innerHTML='<span class="spinner"><i></i><i></i><i></i></span>';send('/resume','approve',t);};
        t.ans.appendChild(document.createElement('br'));t.ans.appendChild(b);scroll();
      }
      else if(e.type==='error'){t.ans.innerHTML='⚠ '+esc(e.message);}
      else if(e.type==='done'){if(t.count===0){t.act.remove();}else{t.act.open=false;}}
    }}
}
function ask(m){if(!m)return;userRow(m);q.value='';scroll();send('/chat',m);}
f.onsubmit=function(ev){ev.preventDefault();ask(q.value.trim());};
document.querySelectorAll('.chip').forEach(function(c){c.addEventListener('click',function(){ask(c.textContent);});});
</script></body></html>
